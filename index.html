<!DOCTYPE html>
<html lang="en">

<head>
  <script src="https://cdn.trackjs.com/agent/v3/latest/t.js"></script>
  <script>
    TrackJS.install({
      token: "aa304ea370d94619ab2f9b37e9a1fbf6",
      application: "lab9-test"
      // for more configuration options, see https://docs.trackjs.com
    });
  </script>

  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lab 9</title>
  <link rel="icon" href="./favicon.ico" type="image/svg+xml">

  <style>
    button {
      margin: 3px;
    }

    button:hover {
      cursor: pointer;
    }

    #first-num,
    #second-num {
      width: 60px;
    }

    output {
      border: 1px solid gray;
      display: block;
      height: 18px;
      margin-top: 5px;
      padding: 5px;
      width: 240px;
    }

    main {
      width: 800px;
    }

    #error-btns {
      column-gap: 5px;
      display: flex;
      flex-wrap: wrap;
      margin-top: 30px;
      row-gap: 5px;
    }

    #error-btns>* {
      padding: 8px 2px;
      width: 122px;
    }
  </style>
</head>

<body>
  <main>
    <form>
      <fieldset>
        <legend>Error Calculator</legend>
        <input name="first-num" id="first-num" />
        <select name="operator" id="operator">
          <option>+</option>
          <option>-</option>
          <option>*</option>
          <option>/</option>
        </select>
        <input name="second-num" id="second-num" />
        <button id="calculate">Calculate</button>
        <br />
        <output></output>
      </fieldset>
    </form>

    <section id="error-btns">
      <button>Console Log</button>
      <button>Console Error</button>
      <button>Console Count</button>
      <button>Console Warn</button>
      <button>Console Assert</button>
      <button>Console Clear</button>
      <button>Console Dir</button>
      <button>Console dirxml</button>
      <button>Console Group Start</button>
      <button>Console Group End</button>
      <button>Console Table</button>
      <button>Start Timer</button>
      <button>End Timer</button>
      <button>Console Trace</button>
      <button>Trigger a Global Error</button>
    </section>
  </main>

  <script>
    let form = document.querySelector('form');
    form.addEventListener('submit', e => {
      e.preventDefault();
      let output = document.querySelector('output');
      let firstNum = document.querySelector('#first-num').value;
      let secondNum = document.querySelector('#second-num').value;
      let operator = document.querySelector('#operator').value;
      let result;

      switch (operator) {
        case "+":
          result = firstNum + secondNum;
          break;
        case "-":
          result = firstNum - secondNum;
          break;
        case "*":
          result = firstNum * secondNum;
          break;
        case "/":
          result = firstNum / secondNum;
          break;
      }

      output.innerHTML = result;
    });

    let errorBtns = Array.from(document.querySelectorAll('#error-btns > button'));

    // Start your code here
    // You may move this JS to another file if you wish
    class CalculatorError extends Error {
    constructor(message) {
      super(message);
      this.name = "CalculatorError";
    }
  }

  // Runs BEFORE the og submit listener and stops it from running
  form.addEventListener('submit', e => {
    e.preventDefault();
    e.stopImmediatePropagation();

    let output = document.querySelector('output');
    let firstNum = document.querySelector('#first-num').value;
    let secondNum = document.querySelector('#second-num').value;
    let operator = document.querySelector('#operator').value;

    try {
      if (firstNum === "" || secondNum === "") {
        throw new CalculatorError("Both input boxes must have numbers.");
      }

      let num1 = Number(firstNum);
      let num2 = Number(secondNum);

      if (Number.isNaN(num1) || Number.isNaN(num2)) {
        throw new CalculatorError("Inputs must be valid numbers.");
      }

      if (operator === "/" && num2 === 0) {
        throw new CalculatorError("Cannot divide by zero.");
      }

      let result;

      switch (operator) {
        case "+":
          result = num1 + num2;
          break;
        case "-":
          result = num1 - num2;
          break;
        case "*":
          result = num1 * num2;
          break;
        case "/":
          result = num1 / num2;
          break;
        default:
          throw new CalculatorError("Invalid operator.");
      }

      output.innerHTML = result;
    } catch (error) {
      console.error("Calculator error caught:", error);
      output.innerHTML = error.message;
    } finally {
      console.log("Calculation attempt finished.");
    }
  }, true);

  // GLOBAL error handlers
  window.onerror = function (message, source, line, col, error) {
    console.log("Global error caught by window.onerror:", message);
  };

  window.addEventListener("error", event => {
    console.log("Global error caught by addEventListener:", event.message);
  });

  const sampleUser = {
    name: "Eric",
    role: "Student",
    lab: "Lab 9"
  };

  const sampleTable = [
    { method: "console.log", purpose: "General output" },
    { method: "console.error", purpose: "Error messages" },
    { method: "console.table", purpose: "Display data as a table" }
  ];

  errorBtns.forEach(button => {
    button.addEventListener("click", () => {
      let text = button.textContent;

      switch (text) {
        case "Console Log":
          console.log("This is a console.log demo.");
          break;

        case "Console Error":
          console.error("This is a console.error demo.");
          break;

        case "Console Count":
          console.count("Console Count button clicked");
          break;

        case "Console Warn":
          console.warn("This is a console.warn demo.");
          break;

        case "Console Assert":
          console.assert(2 + 2 === 5, "Assertion failed: 2 + 2 does not equal 5.");
          break;

        case "Console Clear":
          console.clear();
          break;

        case "Console Dir":
          console.dir(document.querySelector("form"));
          break;

        case "Console dirxml":
          console.dirxml(document.querySelector("main"));
          break;

        case "Console Group Start":
          console.group("Lab 9 Console Group");
          console.log("Inside the group.");
          console.log(sampleUser);
          break;

        case "Console Group End":
          console.log("Ending console group.");
          console.groupEnd();
          break;

        case "Console Table":
          console.table(sampleTable);
          break;

        case "Start Timer":
          console.time("Lab 9 Timer");
          console.log("Timer started.");
          break;

        case "End Timer":
          console.timeEnd("Lab 9 Timer");
          break;

        case "Console Trace":
          function traceDemo() {
            console.trace("This is a console.trace demo.");
          }
          traceDemo();
          break;

        case "Trigger a Global Error":
          throw new Error("This is a triggered global error.");
      }
    });
  });
  </script>
</body>

</html>
